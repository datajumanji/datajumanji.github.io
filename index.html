html<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonkeyHot.net</title>
    <style>
        /* Пълно нулиране и бял фон */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Контейнер, който центрира логото */

            text-align: center;
        }

        /* Настройки за логото */
        .main-logo {
            max-width: 90%;
            width: 450px; /* Можете да промените размера от тук */
            height: auto;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <!-- Вашето лого в средата -->
        <img src="logo.png" alt="DonkeyHot.net" class="main-logo">
    </div>

</body>
</html>
