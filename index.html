<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Начало</title>
    <style>
        /* Нулиране на излишните разстояния */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #ffffff; /* Бял цвят за фон, можете да го смените */
        }

        /* Центриращ контейнер */
        .centered-container {
            display: flex;
            justify-content: center; /* Центрира хоризонтално */
            align-items: center;     /* Центрира вертикално */
            height: 100vh;           /* Заема 100% от височината на екрана */
        }

        /* Настройки за логото */
        .centered-container img {
            max-width: 90%;          /* Предотвратява излизане извън екрана на телефон */
            height: auto;            /* Запазва пропорциите на логото */
        }
    </style>
</head>
<body>

    <div class="centered-container">
        <img src="logo.png" alt="Лого">
    </div>

</body>
</html>
