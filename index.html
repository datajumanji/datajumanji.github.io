<head>

    <meta http-equiv="Pragma" content="no-cache">

    <title>DonkeyHot.net</title>
    <style>

        .main-logo {

            height: auto;

            margin: 0 auto;

    </style>

<body>

    <div class="wrapper">
        <!-- Логото по средата -->
        <img src="logo.png" alt="DonkeyHot.net" class="main-logo" onerror="this.onerror=null; this.src='logo.png';">
    </div>

</html>
